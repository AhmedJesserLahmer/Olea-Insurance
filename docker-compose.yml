services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insurance-ai-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://root:lahmerkun1234@mysql:3306/application
      JWT_SECRET_KEY: replace-with-a-long-random-secret
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: insurance-ai-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: lahmerkun1234
      MYSQL_DATABASE: application
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
